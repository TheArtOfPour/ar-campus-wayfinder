<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <title>AR Campus Wayfinder v2</title>
  
  <!-- A-Frame with AR.js -->
  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  
  <!-- LocAR-AFrame for GPS positioning -->
  <script type="module">
    import 'locar-aframe';
  </script>
  
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Start button overlay -->
  <div id="start-overlay" class="loading-overlay">
    <h1 class="start-title">Campus Wayfinder v2</h1>
    <p class="start-description">
      Augmented reality wayfinding for campus navigation.<br>
      Tap below to enable camera and GPS sensors.
    </p>
    <button id="start-btn" class="start-btn">
      Start AR Experience
    </button>
  </div>

  <!-- Loading spinner -->
  <div id="loading" class="loading-overlay" style="display:none;">
    <div class="spinner"></div>
    <p class="loading-text">Initializing GPS and AR...</p>
  </div>

  <!-- A-Frame Scene -->
  <a-scene id="ar-scene" locar-webcam vr-mode-ui="enabled: false">
    <a-assets>      
      <!-- <img id="teardrop-icon" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 150'%3E%3Cpath d='M50,10 C20,40 10,80 10,110 C10,140 50,150 50,150 C50,150 90,140 90,110 C90,80 80,40 50,10 Z' fill='%23667eea' stroke='white' stroke-width='3'/%3E%3Ccircle cx='50' cy='90' r='15' fill='rgba(255,255,255,0.8)'/%3E%3C/svg%3E"/> -->
      <img src="assets/map-marker.png" id="map-marker" />
    </a-assets>
<a-camera look-controls='magicWindowTrackingEnabled: false' wasd-controls locar-camera></a-camera>
  </a-scene>

  <!-- UI Overlay -->
  <div class="reticle-container">
    <div class="reticle"></div>
  </div>

  <div class="arrow-indicator" id="arrow-container">
    <div class="arrow-outer">
      <div class="arrow-inner">
        <div class="arrow-path"></div>
        <div class="arrow-head"></div>
      </div>
    </div>
  </div>

  <div class="compass-container">
    <div class="compass-ring">
      <div class="compass-north">N</div>
      <div class="compass-needle" id="compass-needle"></div>
    </div>
  </div>

  <div class="bottom-panel">
    <div class="search-container">
      <input type="text" id="search-input"
             placeholder="Search locations..." autocomplete="off"
             class="search-input">
      <div id="search-results" class="search-results"></div>
    </div>
    
    <div id="location-card" class="location-card">
      <h3 id="card-title">Campus Wayfinder</h3>
      <div id="card-details" class="location-details">
        <div id="card-icon" class="location-icon">📍</div>
        <span id="card-distance"></span>
      </div>
      <p id="card-description" class="card-description"></p>
    </div>
  </div>

  <div class="version-display" id="version-display">v2.0.0-dev</div>

  <!-- Main application script -->
  <script type="module">
    import { initARApp } from './src/main.js';
    
    document.addEventListener('DOMContentLoaded', () => {
      const startBtn = document.getElementById('start-btn');
      const startOverlay = document.getElementById('start-overlay');
      const loading = document.getElementById('loading');

      if (startBtn) {
        startBtn.addEventListener('click', async () => {
          startOverlay.style.display = 'none';
          loading.style.display = 'flex';

          try {
            await initARApp();
          } catch (error) {
            console.error('Failed to initialize:', error);
          }

          loading.style.display = 'none';
        });
      }
    });
  </script>

  <!-- Debug panel for marker information -->
  <div id="debug-panel">
    <strong>Debug Info</strong><br>
    <span id="debug-gps">GPS: --</span><br>
    <span id="debug-markers">Markers created: 0</span><br>
    <span id="debug-cam">Camera: ready</span><br>
    <div id="debug-log" class="debug-log"></div>
  </div>
</body>
</html>
