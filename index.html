<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <title>AR Campus Wayfinder v3</title>
  
  <!-- A-Frame with AR.js -->
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  
  <!-- LocAR-AFrame for GPS positioning -->
  <script type="module">
    import 'locar-aframe';
  </script>

  <!-- A-Frame Debugger -->
  <script src="https://cdn.jsdelivr.net/npm/aframe-debugger@0.6.0/dist/aframe-debugger.min.js"></script>
  
  <!-- A-Frame Inspector -->
  <script src="https://cdn.jsdelivr.net/npm/aframe-inspector@1.3.2/dist/aframe-inspector.min.js"></script>

</head>
<body>
  <!-- Start button overlay -->
  <div id="start-overlay" class="loading-overlay">
    <h1 class="start-title">Campus Wayfinder v3</h1>
    <p class="start-description">
      Augmented reality wayfinding for campus navigation.<br>
      Tap below to enable camera and GPS sensors.
    </p>
    <button id="start-btn" class="start-btn">
      Start AR Experience
    </button>
    
    <!-- Desktop testing controls -->
    <div class="desktop-controls">
      <h3>Desktop Debug Mode</h3>
      <label>
        <input type="checkbox" id="mock-gps-toggle"> Mock GPS Location (48.7650, -122.5100)
      </label>
      <p class="debug-hint">Press <strong>I</strong> to open Inspector | <strong>Ctrl+Shift+I</strong> for DevTools</p>
    </div>
  </div>

  <!-- Loading spinner -->
  <div id="loading" class="loading-overlay" style="display:none;">
    <div class="spinner"></div>
    <p class="loading-text">Initializing GPS and AR...</p>
  </div>

  <!-- Location selector dropdown -->
  <div id="location-selector-container">
    <label for="location-select">Location:</label>
    <select id="location-select">
      <option value="south">South Campus (Revels, S & S, etc.)</option>
      <option value="btc">BTC (HC, CS, CC, etc.)</option>
    </select>
  </div>

  <!-- A-Frame Scene -->
  <a-scene id="ar-scene" locar-webcam vr-mode-ui="enabled: false">
    <a-assets>      
      <!-- <img id="teardrop-icon" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 150'%3E%3Cpath d='M50,10 C20,40 10,80 10,110 C10,140 50,150 50,150 C50,150 90,140 90,110 C90,80 80,40 50,10 Z' fill='%23667eea' stroke='white' stroke-width='3'/%3E%3Ccircle cx='50' cy='90' r='15' fill='rgba(255,255,255,0.8)'/%3E%3C/svg%3E" /> -->
      <img src="assets/map-marker.png" id="map-marker" />
    </a-assets>
  <a-camera look-controls='magicWindowTrackingEnabled: false' wasd-controls locar-camera></a-camera>
  </a-scene>

  <!-- UI Overlay -->
  <div class="reticle-container">
    <div class="reticle"></div>
  </div>

  <div class="arrow-indicator" id="arrow-container">
    <div class="arrow-outer">
      <div class="arrow-inner">
        <div class="arrow-path"></div>
        <div class="arrow-head"></div>
      </div>
    </div>
  </div>

  <div class="compass-container">
    <div class="compass-ring">
      <div class="compass-north">N</div>
      <div class="compass-needle" id="compass-needle"></div>
    </div>
  </div>

  <div class="bottom-panel">
    <div class="search-container">
      <input type="text" id="search-input"
             placeholder="Search locations..." autocomplete="off"
             class="search-input">
      <div id="search-results" class="search-results"></div>
    </div>
    
    <div id="location-card" class="location-card">
      <h3 id="card-title">Campus Wayfinder</h3>
      <div id="card-details" class="location-details">
        <div id="card-icon" class="location-icon">📍</div>
        <span id="card-distance"></span>
      </div>
      <p id="card-description" class="card-description"></p>
    </div>
  </div>

  <div class="version-display" id="version-display">v3.0.0-dev</div>

  <!-- Main application script -->
  <script type="module">
    import { initARApp } from './src/main.js';
    
    document.addEventListener('DOMContentLoaded', () => {
      const startBtn = document.getElementById('start-btn');
      const startOverlay = document.getElementById('start-overlay');
      const loading = document.getElementById('loading');
      const mockGPSCheckbox = document.getElementById('mock-gps-toggle');

      if (startBtn) {
        startBtn.addEventListener('click', async () => {
          startOverlay.style.display = 'none';
          loading.style.display = 'flex';

          try {
            // If mock GPS is enabled, inject mock data into window for the app to use
            if (mockGPSCheckbox && mockGPSCheckbox.checked) {
              console.log('[Mock GPS] Enabling mock location mode');
              window.mockGPSLocation = { lat: 48.7650, lng: -122.5100 };
            }
            
            await initARApp();
          } catch (error) {
            console.error('Failed to initialize:', error);
          }

          loading.style.display = 'none';
        });
      }
    });
    
    // Keyboard shortcuts for debugging
    document.addEventListener('keydown', (e) => {
      if (e.key === 'i' || e.key === 'I') {
        const inspectorEl = document.querySelector('[inspector]');
        if (inspectorEl && inspectorEl.components['inspector']) {
          inspectorEl.components['inspector'].toggle();
        } else {
          console.log('Press Ctrl+Shift+I to open DevTools');
        }
      }
    });
  </script>
</body>
</html>
